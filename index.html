<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>和暦年齢計算</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="top">
        <div class="era-buttons">
            <button class="era active" onclick="setEra(1926)">昭和</button>
            <button class="era" onclick="setEra(1989)">平成</button>
            <button class="era" onclick="setEra(2019)">令和</button>
        </div>
        <div class="display" id="display">
            --年 --月 --日
        </div>
        <div class="age" id="age">
            --歳
        </div>
    </div>

    <div class="keyboard">
        <div class="key" onclick="press(1)">1</div>
        <div class="key" onclick="press(2)">2</div>
        <div class="key" onclick="press(3)">3</div>
        <div class="key" onclick="press(4)">4</div>
        <div class="key" onclick="press(5)">5</div>
        <div class="key" onclick="press(6)">6</div>
        <div class="key" onclick="press(7)">7</div>
        <div class="key" onclick="press(8)">8</div>
        <div class="key" onclick="press(9)">9</div>
        <div class="uniquekey" onclick="backspace()">←</div>
        <div class="key" onclick="press(0)">0</div>
        <div class="uniquekey" onclick="clearInput()">C</div>
    </div>

    <script src="script.js"></script>

</body>
</html>
